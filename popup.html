<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        /* Ana container */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 320px; /* popup genişliği */
            font-family: 'Segoe UI', Tahoma, sans-serif; /* sistem fontu */
            background: #1a1a2e; /* koyu arka plan */
            color: #e0e0e0; /* açık metin rengi */
            padding: 16px; /* iç boşluk */
        }

        /* Başlık alanı */
        .baslik-alani {
            display: flex; /* yatay düzen */
            align-items: center; /* dikey ortala */
            gap: 10px; /* öğeler arası boşluk */
            margin-bottom: 16px; /* alt boşluk */
            padding-bottom: 12px; /* alt iç boşluk */
            border-bottom: 1px solid #2a2a4a; /* ayırıcı çizgi */
        }
        .baslik-alani svg { flex-shrink: 0; } /* ikon küçülmesin */
        .baslik-alani h1 {
            font-size: 16px; /* başlık boyutu */
            font-weight: 600; /* yarı kalın */
            color: #ffffff; /* beyaz */
        }
        .baslik-alani p {
            font-size: 11px; /* açıklama boyutu */
            color: #8888aa; /* soluk renk */
            margin-top: 2px; /* üst boşluk */
        }

        /* Durum mesajı */
        .durum {
            background: #2a2a4a; /* koyu arka plan */
            border-radius: 8px; /* yuvarlatılmış köşeler */
            padding: 10px 12px; /* iç boşluk */
            margin-bottom: 14px; /* alt boşluk */
            font-size: 12px; /* küçük metin */
            color: #aaaacc; /* soluk renk */
            display: none; /* varsayılan gizli */
        }
        .durum.gorunur { display: block; } /* görünür durumu */
        .durum.basarili { background: #1a3a2a; color: #66cc88; border-left: 3px solid #66cc88; } /* başarı stili */
        .durum.hata { background: #3a1a1a; color: #cc6666; border-left: 3px solid #cc6666; } /* hata stili */
        .durum.bilgi { background: #1a2a3a; color: #6688cc; border-left: 3px solid #6688cc; } /* bilgi stili */

        /* Ayarlar bölümü */
        .ayarlar { margin-bottom: 14px; }
        .ayar-satiri {
            display: flex; /* yatay düzen */
            align-items: center; /* dikey ortala */
            justify-content: space-between; /* iki yana yasla */
            padding: 8px 0; /* dikey boşluk */
            border-bottom: 1px solid #2a2a4a; /* ayırıcı */
        }
        .ayar-satiri:last-child { border-bottom: none; } /* son satırda ayırıcı yok */
        .ayar-etiketi {
            font-size: 13px; /* etiket boyutu */
            color: #ccccdd; /* açık renk */
        }

        /* Toggle switch */
        .toggle {
            position: relative; /* konumlandırma */
            width: 36px; /* genişlik */
            height: 20px; /* yükseklik */
        }
        .toggle input { opacity: 0; width: 0; height: 0; } /* gizli checkbox */
        .toggle-gostergesi {
            position: absolute; /* mutlak konum */
            cursor: pointer; /* tıklanabilir */
            inset: 0; /* tüm kenarlar sıfır */
            background: #3a3a5a; /* kapalı renk */
            border-radius: 10px; /* yuvarlak köşeler */
            transition: 0.3s; /* animasyon */
        }
        .toggle-gostergesi::before {
            content: ''; /* boş içerik */
            position: absolute; /* mutlak konum */
            width: 16px; /* daire genişliği */
            height: 16px; /* daire yüksekliği */
            left: 2px; /* sol konum */
            bottom: 2px; /* alt konum */
            background: #ffffff; /* beyaz daire */
            border-radius: 50%; /* tam yuvarlak */
            transition: 0.3s; /* animasyon */
        }
        input:checked + .toggle-gostergesi { background: #4a8cff; } /* açık renk */
        input:checked + .toggle-gostergesi::before { transform: translateX(16px); } /* sağa kayma */

        /* Font boyutu seçici */
        select {
            background: #2a2a4a; /* arka plan */
            color: #ccccdd; /* metin rengi */
            border: 1px solid #3a3a5a; /* kenarlık */
            border-radius: 4px; /* köşe yuvarlatma */
            padding: 4px 8px; /* iç boşluk */
            font-size: 12px; /* metin boyutu */
            cursor: pointer; /* tıklanabilir */
        }
        select:focus { outline: 1px solid #4a8cff; } /* odaklanma kenarlığı */

        /* Ana buton */
        .yazdir-butonu {
            width: 100%; /* tam genişlik */
            padding: 12px; /* iç boşluk */
            background: linear-gradient(135deg, #4a8cff, #6a5aff); /* gradyan arka plan */
            color: #ffffff; /* beyaz metin */
            border: none; /* kenarlık yok */
            border-radius: 8px; /* yuvarlatılmış köşeler */
            font-size: 14px; /* metin boyutu */
            font-weight: 600; /* yarı kalın */
            cursor: pointer; /* tıklanabilir */
            transition: all 0.2s; /* animasyon */
            display: flex; /* yatay düzen */
            align-items: center; /* dikey ortala */
            justify-content: center; /* yatay ortala */
            gap: 8px; /* öğeler arası boşluk */
        }
        .yazdir-butonu:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,140,255,0.3); } /* hover efekti */
        .yazdir-butonu:active { transform: translateY(0); } /* tıklama efekti */
        .yazdir-butonu:disabled { opacity: 0.5; cursor: not-allowed; transform: none; } /* devre dışı */

        /* Alt bilgi */
        .alt-bilgi {
            text-align: center; /* ortala */
            margin-top: 12px; /* üst boşluk */
            font-size: 10px; /* küçük metin */
            color: #555577; /* soluk renk */
        }
    </style>
</head>
<body>
    <!-- Başlık -->
    <div class="baslik-alani">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4a8cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9V2h12v7"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
        </svg>
        <div>
            <h1>AI Chat Printer</h1>
            <p>Gemini, Claude &amp; ChatGPT konuşmalarını yazdır</p>
        </div>
    </div>

    <!-- Durum mesajı -->
    <div id="durumAlani" class="durum"></div>

    <!-- Ayarlar -->
    <div class="ayarlar">
        <div class="ayar-satiri">
            <span class="ayar-etiketi">Kod bloklarını dahil et</span>
            <label class="toggle">
                <input type="checkbox" id="kodBloklari" checked>
                <span class="toggle-gostergesi"></span>
            </label>
        </div>
        <div class="ayar-satiri">
            <span class="ayar-etiketi">Otomatik yazdır</span>
            <label class="toggle">
                <input type="checkbox" id="otomatikYazdir" checked>
                <span class="toggle-gostergesi"></span>
            </label>
        </div>
        <div class="ayar-satiri">
            <span class="ayar-etiketi">Yazı boyutu</span>
            <select id="yaziBoyutu">
                <option value="11">Küçük (11px)</option>
                <option value="13" selected>Normal (13px)</option>
                <option value="15">Büyük (15px)</option>
            </select>
        </div>
    </div>

    <!-- Yazdır butonu -->
    <button id="yazdirButonu" class="yazdir-butonu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9V2h12v7"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Konuşmayı Yazdır
    </button>

    <!-- Alt bilgi -->
    <div class="alt-bilgi">AI Chat Printer v1.2.0</div>

    <script src="popup.js"></script>
</body>
</html>
